<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포털 테마 비주얼 에디터</title>
<style>
:root{--bg:#f0f4f8;--sur:#fff;--sur2:#f8fafc;--sur3:#e2e8f0;--bdr:#d1d9e6;--acc:#3b82f6;--acc2:#ef4444;--txt:#1e293b;--txt2:#64748b;--mono:'Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Malgun Gothic',sans-serif;font-size:13px;display:flex;flex-direction:column}
.topbar{height:42px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
.topbar-logo{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc)}
.topbar-sub{font-size:10px;color:var(--txt2)}
.tb-sp{flex:1}
.tb-btn{height:28px;padding:0 12px;border:1px solid var(--bdr);border-radius:4px;background:var(--sur2);color:var(--txt);cursor:pointer;font-size:11px;font-family:inherit}
.tb-btn.p{background:var(--acc);color:#fff;border-color:var(--acc)}
.tb-btn:hover{opacity:.85}
.main{flex:1;display:flex;overflow:hidden}
.preview-area{flex:1;background:#dde3ee;display:flex;flex-direction:column;padding:10px;gap:8px;overflow:hidden;min-width:0}
.preview-bar{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--txt2);font-family:var(--mono);flex-shrink:0}
#scale-val{color:var(--acc);font-weight:700}
#sel-hint{color:#f59e0b;font-size:10px}
.preview-wrap{flex:1;overflow:auto;padding:10px}
#scale-wrap{overflow:hidden;flex-shrink:0}
#ppc{width:1200px;transform-origin:top left}
</style>
</head>
<body>
<p>파일이 너무 커서 GitHub API로 직접 업로드가 어렵습니다. git push를 사용해주세요.</p>
</body>
</html>
